spring:
  application:
    name: employee-service

  datasource:
    url: jdbc:mysql://localhost:3306/security_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto:none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8181

jwt:
  secret: mySuperSecretKeyForJwtTokenGeneration123456
  expiration: 86400000